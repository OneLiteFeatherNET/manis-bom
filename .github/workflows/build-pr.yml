name: Build PR

on: [pull_request]

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  build:
    # Reuse the OneLiteFeather org build workflow (Java 25, OS matrix, tests, coverage).
    uses: OneLiteFeatherNET/workflows/.github/workflows/gradle-build-pr.yml@v2.3.0
    with:
      java-version: "25"
      java-distribution: "temurin"
      run-tests: false
    secrets: inherit
